name: Auto-tag on Release PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  auto-tag:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, '🚀 Release v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' src/Ankimon/manifest.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version from manifest: ${VERSION}"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git tag "${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"
          echo "✅ Tag ${{ steps.version.outputs.version }} created and pushed"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Patch Changelog for GitHub Release
        run: |
          python -c "
          import re
          path = 'assets/changelogs/${{ steps.version.outputs.version }}.md'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          # Replace [@username](url) (Nickname) -> @username
          content = re.sub(r'\[@([\w-]+)\]\([^)]+\)\s*\([^)]*\)', r'@\1', content)
          # Replace [@username](url) -> @username
          content = re.sub(r'\[@([\w-]+)\]\([^)]+\)', r'@\1', content)
          # Replace [#number](url) -> #number
          content = re.sub(r'\[(#\d+)\]\([^)]+\)', r'\1', content)
          with open('patched_changelog.md', 'w', encoding='utf-8') as f:
              f.write(content)
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Ankimon v${{ steps.version.outputs.version }}
          body_path: patched_changelog.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

