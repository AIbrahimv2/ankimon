name: Bump Version, Tag, and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.6-E)"
        required: true
      highlights:
        description: "What's new summary (leave blank to let Jules auto-generate!)"
        required: false
        type: string

jobs:
  bump-tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest pytest-qt PyQt6 markdown

      - name: Jules Release Automation
        uses: google-labs-code/jules-invoke@v1.0.0
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            Please finalize the release for version ${{ github.event.inputs.version }}.
            
            Tasks:
            1. First, run the release preparation script using this exact command:
               python scripts/prepare_release.py --version "${{ github.event.inputs.version }}" --highlights "${{ github.event.inputs.highlights }}"
            2. Run `npx -y all-contributors-cli generate` to update the README contributors table.
            3. Follow the instructions in .github/jules/release-prompt.md.
            4. Verify the checklist in .github/jules/checklist.md.
            5. Run integrity tests using 'pytest tests/test_addon_integrity.py'.
            6. If everything looks good, create a Pull Request against 'main'.
            7. Include the checklist results and any highlights in the PR description.
