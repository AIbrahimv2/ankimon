name: Bump Version, Tag, and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (e.g. 1.6-E)"
        required: true
      highlights:
        description: "What's new summary (your personal release message)"
        required: true
        type: string
      psa:
        description: "Custom PSA (leave empty for default dev recruitment message)"
        required: false
        type: string

jobs:
  bump-tag-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get previous tag
        id: previous_tag
        run: |
          CURRENT_VERSION="${{ github.event.inputs.version }}"
          
          # Find all -E pattern tags, sort by creation date, exclude current version
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags | \
                     grep -E '^[0-9]+\.[0-9]+-E$' | \
                     grep -v "^${CURRENT_VERSION}$" | \
                     head -1)
          
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found"
            echo "tag=" >> $GITHUB_OUTPUT
          else
            echo "tag=${PREV_TAG}" >> $GITHUB_OUTPUT
            echo "Previous tag found: ${PREV_TAG}"
          fi

      - name: Load contributor nicknames
        id: nicknames
        run: |
          if [ -f .github/contributor-nicknames.json ]; then
            echo "nicknames_exist=true" >> $GITHUB_OUTPUT
          else
            echo "nicknames_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog using GitHub API
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const previousTag = '${{ steps.previous_tag.outputs.tag }}';
            const newVersion = '${{ github.event.inputs.version }}';
            const nicknamesExist = '${{ steps.nicknames.outputs.nicknames_exist }}' === 'true';
            
            console.log(`Generating changelog for version ${newVersion}`);
            console.log(`Previous tag: ${previousTag || 'NONE'}`);
            
            // Load contributor nicknames
            let nicknames = {};
            if (nicknamesExist) {
              try {
                const { data: nicknameFile } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: '.github/contributor-nicknames.json'
                });
                const content = Buffer.from(nicknameFile.content, 'base64').toString('utf8');
                nicknames = JSON.parse(content);
                console.log('Loaded contributor nicknames:', nicknames);
              } catch (error) {
                console.log('Could not load nicknames:', error.message);
              }
            }
            
            let pullRequests = [];
            const contributors = new Set();
            const previousContributors = new Set();
            
            if (previousTag) {
              try {
                // Get all PRs up to previous tag to find existing contributors
                const { data: oldPRs } = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${context.repo.owner}/${context.repo.repo} is:pr is:merged`,
                  sort: 'updated',
                  order: 'desc',
                  per_page: 100
                });
                
                for (const pr of oldPRs.items) {
                  if (pr.user && pr.user.login !== 'github-actions[bot]') {
                    previousContributors.add(pr.user.login);
                  }
                }
                
                console.log(`Found ${previousContributors.size} previous contributors`);
                
                // Get commits between tags
                const comparison = await github.rest.repos.compareCommitsWithBasehead({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${previousTag}...main`,
                  per_page: 250
                });
                
                console.log(`Found ${comparison.data.commits.length} commits between ${previousTag} and main`);
                
                const prNumbers = new Set();
                
                for (const commit of comparison.data.commits) {
                  try {
                    const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      commit_sha: commit.sha
                    });
                    
                    for (const pr of prs) {
                      if (pr.merged_at && !prNumbers.has(pr.number)) {
                        prNumbers.add(pr.number);
                        pullRequests.push(pr);
                        
                        if (pr.user && pr.user.login !== 'github-actions[bot]') {
                          contributors.add(pr.user.login);
                        }
                      }
                    }
                  } catch (error) {
                    console.log(`Could not fetch PRs for commit ${commit.sha}: ${error.message}`);
                  }
                }
                
                console.log(`Found ${pullRequests.length} unique PRs`);
                
              } catch (error) {
                console.log(`Error comparing commits: ${error.message}`);
                pullRequests = [];
              }
            } else {
              console.log('No previous tag - fetching recent PRs');
              const { data: recentPRs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                sort: 'updated',
                direction: 'desc',
                per_page: 100
              });
              
              pullRequests = recentPRs.filter(pr => pr.merged_at);
              for (const pr of pullRequests) {
                if (pr.user && pr.user.login !== 'github-actions[bot]') {
                  contributors.add(pr.user.login);
                }
              }
            }
            
            // Find new contributors
            const newContributors = [];
            for (const contributor of contributors) {
              if (!previousContributors.has(contributor)) {
                const firstPR = pullRequests.find(pr => pr.user.login === contributor);
                if (firstPR) {
                  newContributors.push({
                    username: contributor,
                    prNumber: firstPR.number
                  });
                }
              }
            }
            
            // Categorize PRs by label and CREATE MARKDOWN LINKS
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`;
            const enhancements = [];
            const bugs = [];
            const documentation = [];
            const other = [];
            
            const discordEnhancements = [];
            const discordBugs = [];
            const discordDocumentation = [];
            const discordOther = [];
            
            for (const pr of pullRequests) {
              const labels = pr.labels.map(l => l.name.toLowerCase());
              
              if (labels.includes('ignore-for-changelog') || 
                  labels.includes('exclude-from-changelog') ||
                  labels.includes('meta: exclude from changelog')) {
                continue;
              }
              
              const login = pr.user.login;
              const nicknameObj = nicknames[login];
              const nickname = (nicknameObj && nicknameObj.nickname) || login;
              const discordId = nicknameObj && nicknameObj.discord_id;
              
              // GitHub Markdown
              const prLink = `[#${pr.number}](${repoUrl}/pull/${pr.number})`;
              const userLink = `[@${login}](https://github.com/${login})`;
              const prEntry = `- ${pr.title} ${prLink} ${userLink}`;
              
              // Discord Markdown
              const userMention = discordId ? `<@${discordId}>` : `@${nickname}`;
              const discordEntry = `- ${pr.title} #${pr.number} ${userMention}`;
              
              if (labels.some(l => ['enhancement', 'feature', 'type: enhancement'].includes(l))) {
                enhancements.push(prEntry);
                discordEnhancements.push(discordEntry);
              } else if (labels.some(l => ['bug', 'fix', 'type: bug'].includes(l))) {
                bugs.push(prEntry);
                discordBugs.push(discordEntry);
              } else if (labels.some(l => ['documentation', 'docs', 'type: documentation'].includes(l))) {
                documentation.push(prEntry);
                discordDocumentation.push(discordEntry);
              } else {
                other.push(prEntry);
                discordOther.push(discordEntry);
              }
            }
            
            // GitHub contributor links
            const contributorLinks = Array.from(contributors)
              .sort()
              .map(username => {
                const nickname = (nicknames[username] && nicknames[username].nickname) || username;
                return `[@${username}](https://github.com/${username}) (${nickname})`;
              })
              .join(', ');
            
            // Discord contributor mentions
            const discordContributorList = Array.from(contributors)
              .sort()
              .map(username => {
                const obj = nicknames[username];
                const discordId = obj && obj.discord_id;
                return discordId ? `<@${discordId}>` : ((obj && obj.nickname) || username);
              })
              .join(', ');
            
            // New contributors section (GitHub)
            const newContributorsSection = newContributors
              .map(nc => {
                const nickname = (nicknames[nc.username] && nicknames[nc.username].nickname) || nc.username;
                return `* [@${nc.username}](https://github.com/${nc.username}) made their first contribution in [#${nc.prNumber}](${repoUrl}/pull/${nc.prNumber}), welcome to the devs 🫡`;
              })
              .join('\n');
            
            // Find contributors missing info
            const missingDiscordIds = Array.from(contributors).filter(username => {
              const obj = nicknames[username];
              return !obj || !obj.discord_id;
            });
            const missingNicknames = Array.from(contributors).filter(username => !nicknames[username]);
            
            // Export data
            core.setOutput('enhancements', enhancements.join('\n'));
            core.setOutput('bugs', bugs.join('\n'));
            core.setOutput('documentation', documentation.join('\n'));
            core.setOutput('other', other.join('\n'));
            core.setOutput('contributors', contributorLinks);
            core.setOutput('new_contributors', newContributorsSection);
            core.setOutput('has_new_contributors', newContributors.length > 0 ? 'true' : 'false');
            core.setOutput('pr_count', enhancements.length + bugs.length + documentation.length + other.length);
            
            core.setOutput('discord_enhancements', discordEnhancements.join('\n'));
            core.setOutput('discord_bugs', discordBugs.join('\n'));
            core.setOutput('discord_documentation', discordDocumentation.join('\n'));
            core.setOutput('discord_other', discordOther.join('\n'));
            core.setOutput('discord_contributors', discordContributorList);
            core.setOutput('missing_discord_ids', missingDiscordIds.join(', '));
            core.setOutput('missing_nicknames', missingNicknames.join(', '));
            core.setOutput('contributor_logins', JSON.stringify(Array.from(contributors)));
            
            console.log('Changelog generation complete!');

      - name: Create final changelog file
        env:
          ENHANCEMENTS: ${{ steps.changelog.outputs.enhancements }}
          BUGS: ${{ steps.changelog.outputs.bugs }}
          DOCUMENTATION: ${{ steps.changelog.outputs.documentation }}
          OTHER: ${{ steps.changelog.outputs.other }}
          CONTRIBUTORS: ${{ steps.changelog.outputs.contributors }}
          NEW_CONTRIBUTORS: ${{ steps.changelog.outputs.new_contributors }}
          HAS_NEW_CONTRIBUTORS: ${{ steps.changelog.outputs.has_new_contributors }}
          PR_COUNT: ${{ steps.changelog.outputs.pr_count }}
          HIGHLIGHTS: ${{ github.event.inputs.highlights }}
        run: |
          version="${{ github.event.inputs.version }}"
          version_no_prefix=$(echo "$version" | sed 's/^v//')
          changelog_path="assets/changelogs/$version_no_prefix.md"
          
          mkdir -p assets/changelogs
          
          # Prepare Contributor List
          if [ -n "$CONTRIBUTORS" ]; then
            thank_you_note="A huge thank you to ${CONTRIBUTORS} for their contributions to this update! <3"
          else
            thank_you_note="Thank you to all contributors! <3"
          fi
          
          # Prepare PSA
          if [ -n "${{ github.event.inputs.psa }}" ]; then
            PSA_TEXT="${{ github.event.inputs.psa }}"
          else
            PSA_TEXT="If you love Ankimon, please join our developers 🥺
          **Dev Guide**: https://h0tp-ftw.github.io/ankimon/

          Feel free to study with us in the **Library VC** in our [Discord](https://discord.gg/Vkvdawxd5s)!"
          fi
          
          # Create changelog
          cat > "$changelog_path" << EOF
## 🌟 Ankimon vVERSION_PLACEHOLDER 🌟

THANK_YOU_PLACEHOLDER

### What's new

$HIGHLIGHTS

### 💢 PSA
$PSA_TEXT

— h0tp 💖

***

## 📜 Full changelog — vVERSION_PLACEHOLDER

EOF
          
          # Add Features & Improvements
          if [ -n "$ENHANCEMENTS" ]; then
            cat >> "$changelog_path" << 'EOF'
### ✨ Features & Improvements!

EOF
            printf '%s\n\n' "$ENHANCEMENTS" >> "$changelog_path"
          fi
          
          # Add Bug Fixes
          if [ -n "$BUGS" ]; then
            cat >> "$changelog_path" << 'EOF'
### 🐛 Bug Fixes & Stability!

EOF
            printf '%s\n\n' "$BUGS" >> "$changelog_path"
          fi
          
          # Add Documentation
          if [ -n "$DOCUMENTATION" ]; then
            cat >> "$changelog_path" << 'EOF'
### 📚 Documentation!

EOF
            printf '%s\n\n' "$DOCUMENTATION" >> "$changelog_path"
          fi
          
          # Add Other changes
          if [ -n "$OTHER" ]; then
            cat >> "$changelog_path" << 'EOF'
### 🔧 Other Changes!

EOF
            printf '%s\n\n' "$OTHER" >> "$changelog_path"
          fi
          
          # Add New Contributors section if there are any
          if [ "$HAS_NEW_CONTRIBUTORS" = "true" ] && [ -n "$NEW_CONTRIBUTORS" ]; then
            cat >> "$changelog_path" << 'EOF'
## New Contributors

EOF
            printf '%s\n\n' "$NEW_CONTRIBUTORS" >> "$changelog_path"
          fi
          
          # Add backup notice
          cat >> "$changelog_path" << 'EOF'
***

Make a backup, but *your progress should NOT BE LOST from updating* - put a bug report if you lose your files

Backup guide ➡️ https://discord.com/channels/1241773562629718148/1303759380768096318

***
EOF
          
          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${version_no_prefix}/g" "$changelog_path"
          sed -i "s|THANK_YOU_PLACEHOLDER|${thank_you_note}|g" "$changelog_path"
          
          echo "Changelog created at: $changelog_path"

      - name: Create Discord announcement file
        env:
          DISCORD_ENHANCEMENTS: ${{ steps.changelog.outputs.discord_enhancements }}
          DISCORD_BUGS: ${{ steps.changelog.outputs.discord_bugs }}
          DISCORD_DOCUMENTATION: ${{ steps.changelog.outputs.discord_documentation }}
          DISCORD_OTHER: ${{ steps.changelog.outputs.discord_other }}
          DISCORD_CONTRIBUTORS: ${{ steps.changelog.outputs.discord_contributors }}
          HIGHLIGHTS: ${{ github.event.inputs.highlights }}
        run: |
          version="${{ github.event.inputs.version }}"
          version_no_prefix=$(echo "$version" | sed 's/^v//')
          discord_path="assets/changelogs/${version_no_prefix}-discord.md"
          
          if [ -n "${{ github.event.inputs.psa }}" ]; then
            PSA_TEXT="${{ github.event.inputs.psa }}"
          else
            PSA_TEXT="If you love Ankimon, please join our developers 🥺
          **Dev Guide**: <https://h0tp-ftw.github.io/ankimon/>

          Feel free to study with us in the **Library VC** in our Discord!"
          fi
          
          cat > "$discord_path" << DEOF
## 🌟 Ankimon v${version_no_prefix} 🌟

A huge thank you to ${DISCORD_CONTRIBUTORS} for their contributions to this update! <3

### What's new

$HIGHLIGHTS

### 💢 PSA
$PSA_TEXT

— h0tp 💖

---

## 📜 Full changelog — v${version_no_prefix}

DEOF
          
          if [ -n "$DISCORD_ENHANCEMENTS" ]; then
            printf '### ✨ Features & Improvements!\n\n%s\n\n' "$DISCORD_ENHANCEMENTS" >> "$discord_path"
          fi
          if [ -n "$DISCORD_BUGS" ]; then
            printf '### 🐛 Bug Fixes & Stability!\n\n%s\n\n' "$DISCORD_BUGS" >> "$discord_path"
          fi
          if [ -n "$DISCORD_DOCUMENTATION" ]; then
            printf '### 📚 Documentation!\n\n%s\n\n' "$DISCORD_DOCUMENTATION" >> "$discord_path"
          fi
          if [ -n "$DISCORD_OTHER" ]; then
            printf '### 🔧 Other Changes!\n\n%s\n\n' "$DISCORD_OTHER" >> "$discord_path"
          fi
          
          cat >> "$discord_path" << 'DEOF'
---

**Download**: <https://github.com/h0tp-ftw/ankimon/releases/latest/download/Ankimon.ankiaddon>

Make a backup, but *your progress should NOT BE LOST from updating* - put a bug report if you lose your files
DEOF
          
          echo "Discord announcement created at: $discord_path"

      - name: Auto-update .all-contributorsrc
        env:
          CONTRIBUTOR_LOGINS: ${{ steps.changelog.outputs.contributor_logins }}
        run: |
          existing_logins=$(jq -r '.contributors[].login' .all-contributorsrc)
          echo "$CONTRIBUTOR_LOGINS" | jq -r '.[]' | while read login; do
            if ! echo "$existing_logins" | grep -qx "$login"; then
              echo "Adding new contributor: $login"
              jq --arg login "$login" \
                 --arg name "$login" \
                 --arg avatar "https://github.com/$login.png" \
                 --arg profile "https://github.com/$login" \
                 '.contributors += [{"login": $login, "name": $name, "avatar_url": $avatar, "profile": $profile, "contributions": ["code"]}]' \
                 .all-contributorsrc > tmp_contrib.json && mv tmp_contrib.json .all-contributorsrc
            fi
          done
          echo "Updated .all-contributorsrc"

      - name: Bump version in manifest.json
        run: |
          version="${{ github.event.inputs.version }}"
          jq --arg ver "$version" '.version = $ver' src/Ankimon/manifest.json > tmp.json && mv tmp.json src/Ankimon/manifest.json
          echo "Updated manifest.json to version: $version"

      - name: Create Pull Request for version bump
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Bump version to ${{ github.event.inputs.version }}"
          title: "🚀 Bump version to ${{ github.event.inputs.version }}"
          body: |
            ## Version Bump to ${{ github.event.inputs.version }}
            
            This automated PR bumps the version and includes an auto-generated changelog.
            
            ### ✅ Pre-Merge Checklist
            - [ ] Review the generated changelog in `assets/changelogs/`
            - [ ] Review the Discord announcement in `assets/changelogs/`
            - [ ] Verify `manifest.json` version update is correct
            ${{ steps.changelog.outputs.missing_discord_ids != '' && format('- [ ] ⚠️ **Missing Discord IDs** for: {0} — edit `.github/contributor-nicknames.json` in this PR to add them', steps.changelog.outputs.missing_discord_ids) || '' }}
            ${{ steps.changelog.outputs.missing_nicknames != '' && format('- [ ] ⚠️ **Missing from contributor-nicknames.json**: {0} — add entries for them', steps.changelog.outputs.missing_nicknames) || '' }}
            
            ---
            
            ### 🚀 After merging, the tag and release are created automatically!
            No manual steps required.
            
            ---
            
            ### 📊 Release Summary
            - **Version**: ${{ github.event.inputs.version }}
            - **PRs included**: ${{ steps.changelog.outputs.pr_count }}
            - **Contributors**: ${{ steps.changelog.outputs.contributors }}
            - **New contributors**: ${{ steps.changelog.outputs.has_new_contributors == 'true' && '✨ Yes!' || 'None' }}
          branch: bump-version-${{ github.event.inputs.version }}
          base: main
          labels: |
            release
            automated
          add-paths: |
            src/Ankimon/manifest.json
            assets/changelogs/
            .all-contributorsrc
            .github/contributor-nicknames.json
